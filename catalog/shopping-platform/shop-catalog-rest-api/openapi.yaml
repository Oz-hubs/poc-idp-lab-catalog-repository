openapi: 3.0.3
info:
  title: Shop Catalog REST API
  version: 1.0.0
  description: |
    REST API exposed by `shop-catalog-service`.
    Lets clients browse products and categories of the shopping platform.
  contact:
    name: oz-hubs
servers:
  - url: https://catalog.shopping-platform.local
    description: Local example server
tags:
  - name: products
    description: Product browsing
  - name: categories
    description: Category browsing
paths:
  /products:
    get:
      tags: [products]
      summary: List products
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category id
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
  /products/{id}:
    get:
      tags: [products]
      summary: Product detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Not found
  /categories:
    get:
      tags: [categories]
      summary: List categories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
components:
  schemas:
    Product:
      type: object
      required: [id, name, price]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        currency:
          type: string
          example: EUR
        categoryId:
          type: string
    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
