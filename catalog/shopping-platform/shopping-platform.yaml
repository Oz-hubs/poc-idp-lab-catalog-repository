      title: Microsoft Teams Channel
    - url: https://hyland.atlassian.net/wiki/spaces/HXP/pages/3105490991/Runbook+Launch+provisioning+E2E
      title: Runbook
    - url: mailto:mar.carrozzo@hyland.com
      title: Team Email
spec:
  type: openapi
  lifecycle: production
  owner: oz-hubs
  system: shopping-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Shop Inventory REST API
      version: 1.0.0
    paths:
      /stock/{productId}:
        get:
          summary: Get stock level for a product
          parameters:
            - in: path
