---
# =============================================================================
# Complete example: e-commerce platform "shopping-platform"
# Shows the relationships between System, Component, API and Resource
# Each entity has a small TechDocs site under its own folder.
# =============================================================================
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-system
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: shopping-platform
  description: Example e-commerce platform composed of frontend, backend, database and external APIs.
  tags:
    - example
    - ecommerce
  annotations:
    backstage.io/techdocs-ref: dir:./system
  links:
    - url: 'https://teams.microsoft.com/l/channel/19%3AwpFJUbTuaBuIhhecEj5mt5URreZw7EET_BG1Ro6pI181%40thread.tacv2/DevEx?groupId=5944ba60-15cf-4b5c-b359-a7819160e34a&tenantId=8ca5db88-a5ab-48f7-a5e0-4ce50935f807&ngc=true'
      title: Microsoft Teams Channel
spec:
  owner: oz-hubs
---
# Frontend ----------------------------------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: shop-web
  description: Web frontend of the shopping platform (consumes the orders backend API).
  tags:
    - react
    - frontend
    - example
  annotations:
    github.com/project-slug: Oz-hubs/shop-web
    backstage.io/techdocs-ref: dir:./shop-web
  links:
    - url: 'https://teams.microsoft.com/l/channel/19%3AwpFJUbTuaBuIhhecEj5mt5URreZw7EET_BG1Ro6pI181%40thread.tacv2/DevEx?groupId=5944ba60-15cf-4b5c-b359-a7819160e34a&tenantId=8ca5db88-a5ab-48f7-a5e0-4ce50935f807&ngc=true'
      title: Microsoft Teams Channel
spec:
  type: website
  lifecycle: production
  owner: oz-hubs
  system: shopping-platform
  consumesApis:
    - shop-orders-rest-api
---
# Orders backend ----------------------------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: shop-orders-service
  description: Backend service that handles orders, exposes a REST API and uses an external payment gateway.
  tags:
    - dotnet
    - backend
    - example
  annotations:
    github.com/project-slug: Oz-hubs/shop-orders-service
    backstage.io/techdocs-ref: dir:./shop-orders-service
  links:
    - url: 'https://teams.microsoft.com/l/channel/19%3AwpFJUbTuaBuIhhecEj5mt5URreZw7EET_BG1Ro6pI181%40thread.tacv2/DevEx?groupId=5944ba60-15cf-4b5c-b359-a7819160e34a&tenantId=8ca5db88-a5ab-48f7-a5e0-4ce50935f807&ngc=true'
      title: Microsoft Teams Channel
spec:
  type: service
  lifecycle: production
  owner: oz-hubs
  system: shopping-platform
  providesApis:
    - shop-orders-rest-api
  consumesApis:
    - payment-gateway-api
  dependsOn:
    - resource:default/shop-orders-db
    - resource:default/shop-events-bus
    - component:default/shop-shared-lib
---
# REST API exposed by the backend -----------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: shop-orders-rest-api
  description: REST API for order management (create, read, update status).
  tags:
    - rest
    - openapi
  annotations:
    backstage.io/techdocs-ref: dir:./shop-orders-rest-api
  links:
    - url: 'https://teams.microsoft.com/l/channel/19%3AwpFJUbTuaBuIhhecEj5mt5URreZw7EET_BG1Ro6pI181%40thread.tacv2/DevEx?groupId=5944ba60-15cf-4b5c-b359-a7819160e34a&tenantId=8ca5db88-a5ab-48f7-a5e0-4ce50935f807&ngc=true'
      title: Microsoft Teams Channel
    - url: https://hyland.atlassian.net/wiki/spaces/HXP/pages/3105490991/Runbook+Launch+provisioning+E2E
      title: Runbook
    - url: mailto:mar.carrozzo@hyland.com
      title: Team Email
spec:
  type: openapi
  lifecycle: production
  owner: oz-hubs
  system: shopping-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Shop Orders REST API
      version: 1.0.0
    paths:
      /orders:
        get:
          summary: List orders
          responses:
            '200':
              description: OK
        post:
          summary: Create a new order
          responses:
            '201':
              description: Created
      /orders/{id}:
        get:
          summary: Order detail
          parameters:
            - in: path
              name: id
              required: true
              schema:
                type: string
          responses:
            '200':
              description: OK
---
# External API consumed (payment gateway) ---------------------------------------
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payment-gateway-api
  description: External payment gateway API (Stripe-like) used by the orders service.
  tags:
    - rest
    - external
  annotations:
    backstage.io/techdocs-ref: dir:./payment-gateway-api
  links:
    - url: 'https://teams.microsoft.com/l/channel/19%3AwpFJUbTuaBuIhhecEj5mt5URreZw7EET_BG1Ro6pI181%40thread.tacv2/DevEx?groupId=5944ba60-15cf-4b5c-b359-a7819160e34a&tenantId=8ca5db88-a5ab-48f7-a5e0-4ce50935f807&ngc=true'
      title: Microsoft Teams Channel
    - url: https://hyland.atlassian.net/wiki/spaces/HXP/pages/3105490991/Runbook+Launch+provisioning+E2E
      title: Runbook
    - url: mailto:mar.carrozzo@hyland.com
      title: Team Email
spec:
  type: openapi
  lifecycle: production
  owner: oz-hubs
  system: shopping-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Payment Gateway API
      version: 1.0.0
    paths:
      /charges:
        post:
          summary: Create a charge
          responses:
            '201':
              description: Created
---
# External provider component for the payment gateway --------------------------
# In Backstage the API "provider" relation is derived from a Component that
# declares the API in `providesApis`. We model the third-party gateway as an
# external Component so that the API has both a provider and a consumer.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: payment-gateway
  description: Third-party payment gateway provider (external, managed outside the org).
  tags:
    - external
    - vendor
  annotations:
    backstage.io/techdocs-ref: dir:./payment-gateway
  links:
    - url: https://stripe.com
      title: Vendor website
    - url: 'https://teams.microsoft.com/l/channel/19%3AwpFJUbTuaBuIhhecEj5mt5URreZw7EET_BG1Ro6pI181%40thread.tacv2/DevEx?groupId=5944ba60-15cf-4b5c-b359-a7819160e34a&tenantId=8ca5db88-a5ab-48f7-a5e0-4ce50935f807&ngc=true'
      title: Microsoft Teams Channel
spec:
  type: service
  lifecycle: production
  owner: oz-hubs
  system: shopping-platform
  providesApis:
    - payment-gateway-api
---
# Database ----------------------------------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: shop-orders-db
  description: PostgreSQL database that persists orders.
  tags:
    - postgres
    - database
  annotations:
    backstage.io/techdocs-ref: dir:./shop-orders-db
  links:
