apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: shop-catalog-rest-api
  description: REST API for the product catalog (browse products and categories).
  tags:
    - rest
    - openapi
  annotations:
    backstage.io/techdocs-ref: dir:./shop-catalog-rest-api
  links:
    - url: 'https://teams.microsoft.com/l/channel/19%3AwpFJUbTuaBuIhhecEj5mt5URreZw7EET_BG1Ro6pI181%40thread.tacv2/DevEx?groupId=5944ba60-15cf-4b5c-b359-a7819160e34a&tenantId=8ca5db88-a5ab-48f7-a5e0-4ce50935f807&ngc=true'
      title: Microsoft Teams Channel
    - url: https://hyland.atlassian.net/wiki/spaces/HXP/pages/3105490991/Runbook+Launch+provisioning+E2E
      title: Runbook
    - url: mailto:mar.carrozzo@hyland.com
      title: Team Email
spec:
  type: openapi
  lifecycle: production
  owner: oz-hubs
  system: shopping-platform
  # The OpenAPI spec lives in a separate file; Backstage resolves the placeholder
  # at ingestion time (path is relative to this catalog YAML).
  definition:
    $text: ./shop-catalog-rest-api/openapi.yaml
---
