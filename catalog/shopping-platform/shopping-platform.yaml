# Catalog (products) backend ----------------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: shop-catalog-service
  description: Backend service that exposes the product catalog (products, categories, prices).
  tags:
    - dotnet
    - backend
    - example
  annotations:
    github.com/project-slug: Oz-hubs/shop-catalog-service
    backstage.io/techdocs-ref: dir:./shop-catalog-service
  links:
    - url: 'https://teams.microsoft.com/l/channel/19%3AwpFJUbTuaBuIhhecEj5mt5URreZw7EET_BG1Ro6pI181%40thread.tacv2/DevEx?groupId=5944ba60-15cf-4b5c-b359-a7819160e34a&tenantId=8ca5db88-a5ab-48f7-a5e0-4ce50935f807&ngc=true'
      title: Microsoft Teams Channel
spec:
  type: service
  lifecycle: production
  owner: oz-hubs
  system: shopping-platform
