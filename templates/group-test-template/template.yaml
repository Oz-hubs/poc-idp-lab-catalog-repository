apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-group-test-repo
  title: New Group Test Repository
  description: Creates a new GitHub repository for group testing, pre-populated with a README and a Backstage catalog descriptor, owned by the Oz-hubs organization.
spec:
  owner: group:default/oz-hubs
  type: service

  parameters:
    - title: Component details
      required:
        - name
        - description
      properties:
        name:
          title: Name
          type: string
          description: Unique name of the component
          ui:autofocus: true
          pattern: '^[a-z0-9-]+$'
        description:
          title: Description
          type: string
          description: A short description of this repository
        owner:
          title: Owner
          type: string
          description: Owner of the component
          default: group:default/oz-hubs
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]
        codeowners:
          title: Code Owners
          type: string
          description: 'GitHub CODEOWNERS entry (e.g. @org/team-name or @username)'
          default: '@Oz-hubs'
    - title: Choose a location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - Oz-hubs

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          codeowners: ${{ parameters.codeowners }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: notify
      name: Notify
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - group:default/oz-hubs
        title: Repository created
        info: '${{ parameters.name }} has been created and registered in the catalog.'
        severity: normal

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
